<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summer Premier League Season 3 | Standings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --dark-bg: #030712;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--dark-bg);
            color: #f8fafc;
            background-image: 
                radial-gradient(circle at 50% -20%, #1e293b 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, #0f172a 0%, transparent 40%);
        }

        .spl-font { font-family: 'Syncopate', sans-serif; }

        .glass-table {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        .category-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
        }

        .category-card.active {
            background: rgba(0, 242, 255, 0.05);
            border-color: var(--neon-blue);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.1);
        }

        .qualify-row {
            background: linear-gradient(90deg, rgba(0, 242, 255, 0.05) 0%, transparent 100%);
            border-left: 4px solid var(--neon-blue);
        }

        .stat-badge {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            color: #94a3b8;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10">

    <!-- Brand Header -->
    <header class="max-w-6xl mx-auto text-center mb-16">
        <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-blue-500/10 border border-blue-500/20 text-blue-400 text-[10px] font-black uppercase tracking-[0.3em] mb-6">
            <span class="relative flex h-2 w-2">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
            </span>
            Official Live Standings
        </div>
        <h1 class="spl-font text-3xl md:text-5xl font-bold tracking-tighter mb-4">
            SUMMER PREMIER <br>
            <span class="text-transparent bg-clip-text bg-gradient-to-r from-[#00f2ff] to-[#bc13fe]">LEAGUE SEASON 3</span>
        </h1>
    </header>

    <main class="max-w-6xl mx-auto">
        
        <!-- Category Selector -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10">
            <div onclick="switchLeague('u17')" id="tab-u17" class="category-card active p-6 rounded-2xl">
                <div class="flex justify-between items-start mb-4">
                    <i class="fas fa-shield-halved text-2xl text-blue-400"></i>
                    <span class="stat-badge">15 TEAMS</span>
                </div>
                <h3 class="font-bold text-xl">U-17 BOYS</h3>
                <p class="text-xs text-slate-500 mt-1">League-cum-Knockout</p>
            </div>

            <div onclick="switchLeague('u15')" id="tab-u15" class="category-card p-6 rounded-2xl">
                <div class="flex justify-between items-start mb-4">
                    <i class="fas fa-bolt text-2xl text-purple-400"></i>
                    <span class="stat-badge">15 TEAMS</span>
                </div>
                <h3 class="font-bold text-xl">U-15 BOYS</h3>
                <p class="text-xs text-slate-500 mt-1">League-cum-Knockout</p>
            </div>

            <div onclick="switchLeague('girls')" id="tab-girls" class="category-card p-6 rounded-2xl">
                <div class="flex justify-between items-start mb-4">
                    <i class="fas fa-crown text-2xl text-pink-400"></i>
                    <span class="stat-badge">6 TEAMS</span>
                </div>
                <h3 class="font-bold text-xl">GIRLS</h3>
                <p class="text-xs text-slate-500 mt-1">Single League Group</p>
            </div>
        </div>

        <!-- Points Table -->
        <div class="glass-table overflow-hidden">
            <div class="p-6 border-b border-white/5 flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-3">
                    <div class="h-8 w-1 bg-blue-500 rounded-full"></div>
                    <h2 id="table-title" class="spl-font text-lg font-bold tracking-widest uppercase">U-17 Boys Leaderboard</h2>
                </div>
                <div class="flex gap-4">
                    <div class="text-center">
                        <p class="text-[10px] text-slate-500 uppercase font-bold">Qualify Zone</p>
                        <p id="qualify-info" class="text-xs font-bold text-green-400">Top 4 to Semis</p>
                    </div>
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-white/5 text-slate-400 text-[10px] uppercase font-black tracking-widest">
                        <tr>
                            <th class="px-8 py-5">Rank</th>
                            <th class="px-8 py-5">Club</th>
                            <th class="px-4 py-5 text-center">P</th>
                            <th class="px-4 py-5 text-center">W</th>
                            <th class="px-4 py-5 text-center">L</th>
                            <th class="px-8 py-5 text-right text-blue-400">PTS</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-white/5">
                        <!-- Content Injected by JS -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Footer Key -->
        <div class="mt-8 flex flex-wrap gap-6 justify-center text-[10px] font-bold uppercase tracking-widest text-slate-500">
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 bg-blue-500/20 border border-blue-500 rounded-sm"></div>
                <span>Promotion Zone</span>
            </div>
            <div class="flex items-center gap-2">
                <span>P: Played</span>
            </div>
            <div class="flex items-center gap-2">
                <span>W: Won</span>
            </div>
            <div class="flex items-center gap-2">
                <span>L: Lost</span>
            </div>
        </div>
    </main>

    <script>
        /**
         * HOW TO CHANGE POINTS:
         * In each category below (u17, u15, girls), update the numbers next to the team names.
         * Format: [Played, Won, Lost, Points] (GD removed)
         */
        const leagueData = {
            u17: {
                title: "U-17 Boys Leaderboard",
                qualify: "Top 4 to Semis",
                qCount: 4,
                teams: [
                    { name: "Red Wings FC", stats: [0, 0, 0, 0] },
                    { name: "Blue Thunder", stats: [0, 0, 0, 0] },
                    { name: "Iron Guard", stats: [0, 0, 0, 0] },
                    { name: "Eagle Academy", stats: [0, 0, 0, 0] },
                    { name: "Shadow Strikers", stats: [0, 0, 0, 0] },
                    { name: "Neon United", stats: [0, 0, 0, 0] },
                    { name: "Cyber Kings", stats: [0, 0, 0, 0] },
                    { name: "Golden XI", stats: [0, 0, 0, 0] },
                    { name: "Apex Warriors", stats: [0, 0, 0, 0] },
                    { name: "Velocity FC", stats: [0, 0, 0, 0] },
                    { name: "Zenith Squad", stats: [0, 0, 0, 0] },
                    { name: "Phantom FC", stats: [0, 0, 0, 0] },
                    { name: "Storm Chasers", stats: [0, 0, 0, 0] },
                    { name: "Titan Academy", stats: [0, 0, 0, 0] },
                    { name: "Blaze Force", stats: [0, 0, 0, 0] }
                ]
            },
            u15: {
                title: "U-15 Boys Leaderboard",
                qualify: "Top 4 to Semis",
                qCount: 4,
                teams: [
                    { name: "Junior Wings", stats: [10, 0, 0, 0] },
                    { name: "Flash Academy", stats: [0, 0, 0, 0] },
                    { name: "Swift Strikers", stats: [0, 0, 0, 0] },
                    { name: "Tiny Titans", stats: [0, 0, 0, 0] },
                    { name: "Baby Blues", stats: [0, 0, 0, 0] },
                    { name: "Future Stars", stats: [0, 0, 0, 0] },
                    { name: "Mini Kings", stats: [0, 0, 0, 0] },
                    { name: "Bolt FC", stats: [0, 0, 0, 0] },
                    { name: "Eco Rangers", stats: [0, 0, 0, 0] },
                    { name: "Pulse XI", stats: [0, 0, 0, 0] },
                    { name: "Rapid United", stats: [0, 0, 0, 0] },
                    { name: "Vortex FC", stats: [0, 0, 0, 0] },
                    { name: "Sonic Squad", stats: [0, 0, 0, 0] },
                    { name: "Astro Academy", stats: [0, 0, 0, 0] },
                    { name: "Core FC", stats: [0, 0, 0, 0] }
                ]
            },
            girls: {
                title: "Girls Leaderboard",
                qualify: "Top 2 to Final",
                qCount: 2,
                teams: [
                    { name: "Athena Girls", stats: [0, 0, 0, 0] },
                    { name: "Warrior Queens", stats: [0, 0, 0, 0] },
                    { name: "Diamond Divas", stats: [0, 0, 0, 0] },
                    { name: "Valkyrie FC", stats: [0, 0, 0, 0] },
                    { name: "Siren United", stats: [0, 0, 0, 0] },
                    { name: "Phoenix Ladies", stats: [0, 0, 0, 0] }
                ]
            }
        };

        function switchLeague(key) {
            // Update UI State
            ['u17', 'u15', 'girls'].forEach(k => {
                document.getElementById('tab-' + k).classList.remove('active');
            });
            document.getElementById('tab-' + key).classList.add('active');

            const data = leagueData[key];
            document.getElementById('table-title').innerText = data.title;
            document.getElementById('qualify-info').innerText = data.qualify;

            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            data.teams.forEach((teamObj, i) => {
                const rank = i + 1;
                const isQualify = rank <= data.qCount;
                const [p, w, l, pts] = teamObj.stats;
                
                tbody.innerHTML += `
                    <tr class="${isQualify ? 'qualify-row' : ''} hover:bg-white/5 transition-all">
                        <td class="px-8 py-5">
                            <span class="text-sm font-black ${rank <= 3 ? 'text-blue-400' : 'text-slate-600'}">
                                ${rank.toString().padStart(2, '0')}
                            </span>
                        </td>
                        <td class="px-8 py-5">
                            <div class="flex items-center gap-4">
                                <div class="w-8 h-8 rounded-lg bg-slate-800 flex items-center justify-center text-[10px] font-bold">
                                    ${teamObj.name.substring(0, 2).toUpperCase()}
                                </div>
                                <span class="font-bold text-sm tracking-tight text-slate-200">${teamObj.name}</span>
                            </div>
                        </td>
                        <td class="px-4 py-5 text-center text-xs text-slate-400">${p}</td>
                        <td class="px-4 py-5 text-center text-xs text-slate-400">${w}</td>
                        <td class="px-4 py-5 text-center text-xs text-slate-400">${l}</td>
                        <td class="px-8 py-5 text-right font-black text-blue-400">${pts}</td>
                    </tr>
                `;
            });
        }

        // Initialize with U-17
        window.onload = () => switchLeague('u17');
    </script>
</body>
</html>
